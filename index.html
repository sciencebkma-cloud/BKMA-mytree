<!DOCTYPE html>
<html lang="th">

<title>ต้นไม้แห่งการทดลอง</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<!--
  หมายเหตุฟอนต์: "PSL อมยิ้ม" เป็นฟอนต์เชิงพาณิชย์ของ PSL ไม่มีให้ใช้ผ่าน Google Fonts/CDN
  สาธารณะ (ต้องซื้อไลเซนส์และโฮสต์ไฟล์ .woff เอง) จึงแทนด้วย "Mali" ซึ่งเป็นฟอนต์ไทยแนวกลม
  น่ารักที่ให้ฟีลใกล้เคียงและใช้ฟรีได้ทันที ถ้าโรงเรียนมีไฟล์ PSL อมยิ้มอยู่แล้ว สามารถแทนที่ได้
  โดยเพิ่ม @font-face ด้านล่างนี้แล้วเปลี่ยนชื่อใน --font-display / --font-body
  ตัวอย่าง: @font-face{font-family:'PSL Amornsan';src:url('fonts/PSL-Amornsan.woff2') format('woff2');}
-->
<style>
  :root{
    --font-display:'Baloo 2', 'Mali', sans-serif;
    --font-body:'Mali', sans-serif;
    --paper:#EAF6FF; --surface:#FFFFFF; --surface-2:#FFFFFF;
    --ink:#3A3159; --ink-muted:#7A7295; --line:#D9E9FA;
    --green:#57C08A; --green-deep:#2E9E68; --gold:#FFC94A; --brick:#FF6F91;
    --pink:#FF8FB1; --blue:#6EC6FF; --purple:#B79CED; --yellow:#FFD93D;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(circle at 8% 12%, #FFF3B0 0%, transparent 40%),
      radial-gradient(circle at 92% 18%, #C9F2E0 0%, transparent 38%),
      radial-gradient(circle at 15% 90%, #FFD6E8 0%, transparent 35%),
      var(--paper);
    background-attachment:fixed;
  }
  a{color:inherit;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 18px 64px;}
  .eyebrow{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.03em;color:var(--green-deep);text-transform:uppercase;margin:0 0 4px;}
  h1{font-family:var(--font-display);font-weight:800;font-size:34px;margin:0;color:var(--green-deep);text-shadow:2px 3px 0 rgba(255,255,255,.6);}
  h2{font-family:var(--font-display);font-weight:700;font-size:19px;margin:0 0 4px;color:var(--green-deep);}
  .sub{font-size:14px;color:var(--ink-muted);margin:0 0 14px;}
  .card{
    background:var(--surface);border:3px solid var(--line);border-radius:var(--radius);padding:20px;
    box-shadow:0 8px 0 rgba(217,233,250,.7), 0 10px 22px rgba(120,140,200,.10);
  }
  .btn{
    font-family:var(--font-display);font-weight:700;font-size:15px;
    border:none;background:var(--green);color:#fff;
    padding:12px 22px;border-radius:999px;cursor:pointer;transition:.15s;
    box-shadow:0 5px 0 var(--green-deep);
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-deep);}
  .btn.ghost{background:#fff;color:var(--green-deep);border:2px solid var(--green);box-shadow:0 4px 0 var(--line);}
  .btn.ghost:hover{background:#F3FFFA;}
  .btn.small{padding:7px 14px;font-size:13px;box-shadow:0 3px 0 var(--green-deep);}
  .back{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ink-muted);cursor:pointer;display:inline-block;margin-bottom:14px;}
  .back:hover{color:var(--green-deep);}
  input,textarea,select{
    font-family:var(--font-body);font-size:15px;padding:11px 14px;
    border:2px solid var(--line);border-radius:14px;background:#FBFDFF;color:var(--ink);width:100%;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);}
  label.field{display:block;font-size:13px;color:var(--ink-muted);margin:12px 0 6px;font-family:var(--font-display);font-weight:600;}

  /* login */
  .login-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:26px;}
  .login-buttons{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  .login-card{
    width:220px;padding:32px 18px;background:var(--surface);border:3px solid var(--line);
    border-radius:26px;cursor:pointer;transition:.18s;
    box-shadow:0 8px 0 rgba(217,233,250,.8), 0 10px 22px rgba(120,140,200,.12);
  }
  .login-card:nth-child(1){border-color:#BFEBD6;}
  .login-card:nth-child(2){border-color:#FFD6E4;}
  .login-card:hover{transform:translateY(-5px) rotate(-1deg);}
  .login-card .icon{font-size:44px;margin-bottom:10px;}
  .login-card b{font-family:var(--font-display);font-weight:800;font-size:19px;color:var(--green-deep);}

  /* room grid */
  .room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-top:18px;}
  .room-card{background:var(--surface);border:3px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s;
    box-shadow:0 6px 0 rgba(217,233,250,.8);}
  .room-card:nth-child(7n+1){border-color:#BFEBD6;} .room-card:nth-child(7n+2){border-color:#FFD6E4;}
  .room-card:nth-child(7n+3){border-color:#FFEBAE;} .room-card:nth-child(7n+4){border-color:#D6E4FF;}
  .room-card:nth-child(7n+5){border-color:#E3D6FF;} .room-card:nth-child(7n+6){border-color:#FFDCC2;}

  .room-card .pct{font-family:var(--font-display);font-weight:800;font-size:28px;color:var(--green);}
  .room-card .bar{height:10px;background:var(--line);border-radius:999px;margin-top:8px;overflow:hidden;}
  .room-card .bar>div{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:999px;}

  /* dashboard */
  .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;margin-top:18px;}
  @media(max-width:880px){.grid{grid-template-columns:1fr;}}
  .tree-card{grid-row:span 2;display:flex;flex-direction:column;}
  .tree-stage{position:relative;flex:1;min-height:340px;background:linear-gradient(180deg,#EAF8FF 0%, #F3FFF6 65%, #FFF3D6 100%);border-radius:18px;border:3px solid var(--line);overflow:hidden;}
  .tree-stat{position:absolute;top:14px;left:14px;font-family:var(--font-display);font-weight:700;background:rgba(255,255,255,.9);border:2px solid var(--line);padding:8px 14px;border-radius:16px;font-size:13px;line-height:1.5;}
  .tree-stat b{font-size:24px;color:var(--green-deep);display:block;}
  .week-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .week-tab{font-family:var(--font-display);font-weight:600;font-size:12px;border:2px solid var(--line);background:var(--surface-2);padding:7px 12px;border-radius:999px;cursor:pointer;color:var(--ink-muted);}
  .week-tab.active{background:var(--green);border-color:var(--green);color:#fff;}

  .roster{max-height:230px;overflow:auto;font-size:14px;}
  .roster-row{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:2px dashed var(--line);cursor:default;}
  .roster-row:last-child{border-bottom:none;}
  .tag{font-family:var(--font-display);font-weight:700;font-size:11px;padding:4px 10px;border-radius:999px;}
  .tag.sent{background:rgba(87,192,138,.18);color:var(--green-deep);}
  .tag.missing{background:rgba(255,111,145,.16);color:var(--brick);}
  .tag.mismatch{background:rgba(255,111,145,.28);color:var(--brick);font-size:10px;margin-left:6px;}
  .roster-row-mismatch{background:rgba(255,111,145,.07);border-radius:10px;padding-left:6px;padding-right:6px;}
  .name-mismatch{color:var(--brick);font-weight:700;}

  .gallery{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  @media(max-width:640px){.gallery{grid-template-columns:repeat(3,1fr);}}
  .gallery .ph{aspect-ratio:1;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,var(--pink) 0%, var(--yellow) 130%);opacity:.45;border:2px solid #fff;}
  .gallery .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery .ph.has-photo{opacity:1;}
  .gallery .ph.photo-broken{display:flex;align-items:center;justify-content:center;background:var(--surface-2);opacity:1;}
  .photo-fallback-link{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--green-deep);text-decoration:underline;}

  /* search */
  .search-box{margin-top:16px;}
  .name-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto;}
  .name-item{padding:13px 16px;background:var(--surface-2);border:2px solid var(--line);border-radius:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;}
  .name-item:hover{border-color:var(--green);transform:translateX(3px);}

  /* student page */
  .tabs{display:flex;gap:8px;margin:18px 0;}
  .tab{font-family:var(--font-display);font-weight:600;font-size:13px;padding:9px 16px;border-radius:999px;border:2px solid var(--line);background:var(--surface-2);cursor:pointer;color:var(--ink-muted);}
  .tab.active{background:var(--green-deep);border-color:var(--green-deep);color:#fff;}
  .photo-preview{width:120px;height:120px;border-radius:16px;object-fit:cover;margin-top:10px;border:2px solid var(--line);display:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:13px 24px;border-radius:999px;font-family:var(--font-display);font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 6px 16px rgba(46,158,104,.35);}
  .toast.show{opacity:1;transform:translate(-50%,-6px);}

  footer.note{margin-top:26px;font-size:12.5px;color:var(--ink-muted);border-top:2px dashed var(--line);padding-top:14px;}
  @keyframes treeSway{ 0%,100%{transform:rotate(-1.6deg);} 50%{transform:rotate(1.6deg);} }
  .tree-sway{ animation: treeSway 3.4s ease-in-out infinite; transform-box: fill-box; }
</style>

<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   LIVE DATA LAYER
   ข้อมูลจริงดึงจาก Google Sheet ที่ครู/ผู้จัดการเชื่อมกับ JotForm ไว้
   รองรับ 2 วิธี:
   1) Google Sheets API v4 — เร็วเกือบทันที ไม่มี cache ของ Google
      (ต้องตั้งค่า SHEETS_API_KEY + SPREADSHEET_ID ด้านล่าง)
   2) Publish-to-web CSV — สำรองไว้ใช้อัตโนมัติถ้ายังไม่ได้ตั้งค่า API
      (มี delay จาก cache ของ Google เอง)
   ============================================================ */

/* ---- ตั้งค่า Google Sheets API (ใส่ให้ครบ 2 ค่านี้เพื่อเปิดโหมดเร็ว) ----
   วิธีได้มา:
   1. เปิด Google Cloud Console → สร้างโปรเจกต์ → เปิดใช้ "Google Sheets API"
   2. Credentials → Create Credentials → API key → คัดลอกมาใส่ SHEETS_API_KEY
      (แนะนำจำกัด API key ให้ใช้ได้เฉพาะ Sheets API + จำกัด HTTP referrer
      เป็นโดเมนเว็บนี้เท่านั้น เพื่อความปลอดภัย)
   3. เปิด Google Sheet ตัวจริง (ไม่ใช่ลิงก์ publish) → Share → เปลี่ยนเป็น
      "Anyone with the link – Viewer"
   4. คัดลอก SPREADSHEET_ID จาก URL ของ Sheet เช่น
      https://docs.google.com/spreadsheets/d/{SPREADSHEET_ID}/edit#gid=...
   ยังไม่ได้ใส่ค่า → เว็บจะใช้วิธี CSV (ข้อ 2) แทนโดยอัตโนมัติ */
const SHEETS_API_KEY = "AIzaSyCGg2cmjZSw4eNrP_vG84705e7nZXfJzM0";      // TODO: ใส่ API key ที่นี่
const SPREADSHEET_ID  = "19sbc1p0PS5uS9nxPHqZU8NRtCqvEoCJVSjChbvldK5M";      // TODO: ใส่ Spreadsheet ID ที่นี่ (จาก URL ปกติของ Sheet ไม่ใช่ลิงก์ publish)
const SHEET_GID = 476959907;     // แท็บ/ชีตที่ใช้อยู่ตอนนี้ (มาจากลิงก์ CSV ที่ให้ไว้)

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRw16RNf-5JTvQbeIZ79TQXNsBynlidx1iJo9cW4P-krPMWjNyc00fvP_SV-5Q3whkTtpPxhhxKMUqL/pub?gid=476959907&single=true&output=csv";
const JOTFORM_URL = "https://form.jotform.com/261832027231044";
const AUTO_REFRESH_MS = 15000; // โหมด API ไม่มี cache แล้ว จึงตั้งถี่ขึ้นได้อย่างปลอดภัย

/* ลำดับที่ต้องการให้แสดงก่อน ถ้าพบค่านี้ในข้อมูลจริง — ค่าอื่นที่ผู้จัดการ
   เพิ่มใหม่ในอนาคต (เช่น กลุ่มเรียนใหม่ สัปดาห์ใหม่) จะถูกเติมต่อท้ายให้เอง */
const PREFERRED_ROOM_ORDER = ["ป.4 Basic","ป.4 Advance 1","ป.4 Advance 2","ป.4 Advance 3","ป.4 Basic Advance","ป.4 เปิดเพิ่ม","ป.4 Olympic 1","ป.4 Olympic 2","ป.4 Online"];

const HEADER_KEYWORDS = {
  firstName: ["ชื่อจริง","first name","firstname"],
  lastName:  ["นามสกุล","last name","lastname"],
  nickname:  ["ชื่อเล่น","nickname"],
  group:     ["กลุ่มเรียน","กลุ่ม","ห้อง","group"],
  week:      ["สัปดาห์","week"],
  height:    ["เจริญเติบโต","ส่วนสูง","height"],
  observed:  ["ลักษณะ","สังเกต"],
  photo:     ["ภาพถ่าย","รูปภาพ","photo","image"],
  timestamp: ["submission date","วันที่ส่ง","date"]
};
function findColumn(fields, keywords){
  const lower = fields.map(f=>({raw:f, low:f.toLowerCase()}));
  for(const kw of keywords){
    const hit = lower.find(f=>f.low.includes(kw.toLowerCase()));
    if(hit) return hit.raw;
  }
  return null;
}
function sortByPreferred(values, preferred){
  const known = preferred.filter(p=>values.includes(p));
  const extra = values.filter(v=>!preferred.includes(v)).sort((a,b)=>a.localeCompare(b,'th'));
  return [...known, ...extra];
}
function extractWeekNumber(w){ const m = w.match(/(\d+)/); return m?parseInt(m[1],10):999; }
function extractUrlFromCell(value){
  if(!value) return "";
  const m = String(value).match(/https?:\/\/[^\s")]+/);
  return m ? m[0] : "";
}
/* Sheets API (โดยเฉพาะโหมด valueRenderOption=FORMULA) จะคืนค่าตัวเลข/บูลีนเป็นชนิด
   number/boolean จริง ๆ ไม่ใช่ string เสมอไป — ใช้ตัวนี้แทน (x||"").trim() ทุกที่เพื่อกัน
   error ".trim is not a function" เวลาเจอค่าที่ไม่ใช่ string */
function cellStr(v){ return (v===null||v===undefined) ? "" : String(v).trim(); }

async function fetchViaSheetsAPI(){
  // 1) หา "ชื่อแท็บ" จาก SHEET_GID ก่อน เพราะ Sheets API v4 ต้องใช้ชื่อแท็บใน range ไม่ใช่ gid
  const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets.properties&key=${SHEETS_API_KEY}`);
  if(!metaRes.ok) throw new Error("Sheets API (meta) HTTP "+metaRes.status);
  const meta = await metaRes.json();
  const sheetMeta = (meta.sheets||[]).find(s=>s.properties && s.properties.sheetId===SHEET_GID);
  if(!sheetMeta) throw new Error("ไม่พบแท็บที่ตรงกับ SHEET_GID ที่ตั้งไว้");
  const title = sheetMeta.properties.title;

  // 2) ดึงค่าจริงของแท็บนั้น — endpoint นี้ไม่มี cache ฝั่ง Google เหมือน CSV publish
  const range = encodeURIComponent(`${title}!A:Z`);
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?valueRenderOption=FORMULA&key=${SHEETS_API_KEY}`);
  if(!res.ok) throw new Error("Sheets API (values) HTTP "+res.status);
  const json = await res.json();
  const values = json.values||[];
  if(!values.length) throw new Error("ชีตว่าง");
  const fields = values[0];
  const rows = values.slice(1).map(r=>{
    const obj={};
    fields.forEach((f,i)=>{ obj[f]=r[i]!==undefined?r[i]:""; });
    return obj;
  });
  return {rows, fields};
}

async function fetchLiveRows(){
  if(SHEETS_API_KEY && SPREADSHEET_ID){
    try{ return await fetchViaSheetsAPI(); }
    catch(e){ console.warn("Sheets API ใช้ไม่ได้ ใช้ CSV แทนชั่วคราว:", e.message); }
  }
  const res = await fetch(CSV_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const text = await res.text();
  const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
  if(!parsed.data || !parsed.data.length) throw new Error("empty sheet");
  return {rows: parsed.data, fields: parsed.meta.fields||[]};
}

function upsertSubmission(db, roomSet, weekSet, data){
  const {first="", last="", nick="", group="", week="", height="", observed="", photoUrl="", timestamp=""} = data;
  if(!group || !week) return null;
  const fullName = [first,last].filter(Boolean).join(" ") || nick || "(ไม่ระบุชื่อ)";
  const displayName = nick ? `${fullName} (${nick})` : fullName;

  roomSet.add(group); weekSet.add(week);
  db[group] = db[group] || [];
  let student = db[group].find(s=>s.key===fullName+"|"+nick);
  if(!student){
    student = { name: displayName, key: fullName+"|"+nick, submissions:{}, inRoster:false };
    db[group].push(student);
  }
  const resultParts = [];
  if(height) resultParts.push(`สูง ${height} ซม.`);
  if(observed) resultParts.push(observed);

  /* ค่าที่ upsert เข้ามาใหม่จะทับค่าก่อนหน้าของสัปดาห์เดียวกันเสมอ — ถ้าส่งซ้ำ
     หรือผู้จัดการแก้ไขค่าใน Sheet จะได้ค่าล่าสุดเสมอ */
  student.submissions[week] = {
    result: resultParts.join(" · ") || "(ไม่มีรายละเอียด)",
    photo: photoUrl || null,
    hasPhoto: !!photoUrl,
    timestamp: timestamp || ""
  };
  return student;
}

function parseRowsToDB(rows, fields){
  const col = {
    firstName: findColumn(fields, HEADER_KEYWORDS.firstName),
    lastName:  findColumn(fields, HEADER_KEYWORDS.lastName),
    nickname:  findColumn(fields, HEADER_KEYWORDS.nickname),
    group:     findColumn(fields, HEADER_KEYWORDS.group),
    week:      findColumn(fields, HEADER_KEYWORDS.week),
    height:    findColumn(fields, HEADER_KEYWORDS.height),
    observed:  findColumn(fields, HEADER_KEYWORDS.observed),
    photo:     findColumn(fields, HEADER_KEYWORDS.photo),
    timestamp: findColumn(fields, HEADER_KEYWORDS.timestamp)
  };
  if(!col.group || !col.week || !(col.firstName||col.nickname)){
    throw new Error("ไม่พบคอลัมน์หลักที่จำเป็น (กลุ่มเรียน/สัปดาห์/ชื่อ) ในชีต");
  }

  const db = {};
  const roomSet = new Set();
  const weekSet = new Set();

  rows.forEach(row=>{
    upsertSubmission(db, roomSet, weekSet, {
      first: col.firstName ? cellStr(row[col.firstName]) : "",
      last:  col.lastName ? cellStr(row[col.lastName]) : "",
      nick:  col.nickname ? cellStr(row[col.nickname]) : "",
      group: cellStr(row[col.group]),
      week:  cellStr(row[col.week]),
      height: col.height ? cellStr(row[col.height]) : "",
      observed: col.observed ? cellStr(row[col.observed]) : "",
      photoUrl: col.photo ? extractUrlFromCell(row[col.photo]) : "",
      timestamp: col.timestamp ? cellStr(row[col.timestamp]) : ""
    });
  });

  const rooms = sortByPreferred([...roomSet], PREFERRED_ROOM_ORDER);
  const weeks = [...weekSet].sort((a,b)=>extractWeekNumber(a)-extractWeekNumber(b));
  return { db, rooms, weeks };
}

/* ใช้เมื่อดึงคำตอบเดี่ยวจาก JotForm API มาเสียบเข้า DB ที่ใช้งานอยู่จริงทันที
   (ไม่ต้องรอ Google Sheets publish คิวรอบใหม่) */
function mergeLiveSubmission(data){
  const roomSet = new Set(ROOMS);
  const weekSet = new Set(WEEKS);
  const student = upsertSubmission(DB, roomSet, weekSet, data);
  ROOMS = sortByPreferred([...roomSet], PREFERRED_ROOM_ORDER);
  WEEKS = [...weekSet].sort((a,b)=>extractWeekNumber(a)-extractWeekNumber(b));
  if(student) usingMockData = false;
  return student;
}

/* ---------- mock fallback (ใช้เฉพาะตอนโหลดข้อมูลจริงไม่สำเร็จ) ---------- */
const MOCK_ROOMS = PREFERRED_ROOM_ORDER;
const MOCK_WEEKS = ["สัปดาห์ที่ 1 (4/7/69 - 5/7/69)","สัปดาห์ที่ 2 (11/7/69 - 12/7/69)","สัปดาห์ที่ 3 (18/7/69 - 19/7/69)","สัปดาห์ที่ 4 (25/7/69 - 26/7/69)"];
const FIRST = ["ต้นข้าว","พลอย","คุณากร","ฝน","ปัณณ์","ใบเฟิร์น","ธาม","เมย์","กันต์","วรินทร์","สิรินดา","ภูมิ","น้ำฝน","ดวงตะวัน","ปวริศา","เขตต์","ชลิตา","ณดา"];
const LAST  = ["ทองดี","ใจงาม","ศรีสุข","สายลม","วัฒนา","จันทร์เพ็ญ","บุญมี","แสงทอง","รุ่งเรือง","ไพศาล","เกษมสุข","พงษ์พันธุ์"];
function seededRand(seed){ let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
function buildMockDB(){
  const db = {};
  MOCK_ROOMS.forEach((room, ri)=>{
    const rand = seededRand(ri*97+13);
    const count = 12 + Math.floor(rand()*6);
    const students = [];
    for(let i=0;i<count;i++){
      const name = `${FIRST[Math.floor(rand()*FIRST.length)]} ${LAST[Math.floor(rand()*LAST.length)]}`;
      const submissions = {};
      MOCK_WEEKS.forEach((w,wi)=>{
        const chance = 0.55 + ri*0.03 + wi*0.02;
        if(rand() < chance){
          const heights = [2,3.5,5,7.2];
          submissions[w] = {
            result: `สูง ${heights[Math.min(wi,heights.length-1)]} ซม. ใบเริ่มแตกยอดใหม่`,
            photo: null, hasPhoto: rand()<0.6,
            timestamp: `2026-0${wi+1}-1${Math.floor(rand()*9)}`
          };
        }
      });
      students.push({ name, key:name, submissions });
    }
    db[room] = students;
  });
  return { db, rooms: MOCK_ROOMS, weeks: MOCK_WEEKS };
}

/* ---------- ROSTER TAB (รายชื่อนักเรียนทั้งหมด — ให้ผู้จัดการแก้ไขได้ตลอดเวลา) ----------
   สร้างแท็บใหม่ในสเปรดชีตเดียวกันชื่อ "รายชื่อนักเรียน" มีคอลัมน์:
   กลุ่มเรียน | ชื่อจริง | นามสกุล | ชื่อเล่น (ไม่บังคับ)
   ผู้จัดการเพิ่ม/ลบ/แก้ชื่อในแท็บนี้ได้ตลอดเวลาโดยไม่ต้องแก้โค้ดเว็บเลย — เว็บจะดึงมา
   รวมกับข้อมูลการส่งผลอัตโนมัติทุกครั้งที่โหลด/รีเฟรช ถ้ายังไม่สร้างแท็บนี้ไว้ ระบบจะ
   ข้ามส่วนนี้ไปเงียบ ๆ และใช้ ROOM_TOTAL_STUDENTS ด้านล่างแทนเหมือนเดิม */
const ROSTER_SHEET_NAME = "รายชื่อนักเรียน";
let rosterLoaded = false;

async function fetchRosterRows(){
  if(!(SHEETS_API_KEY && SPREADSHEET_ID)) return null;
  try{
    const range = encodeURIComponent(`${ROSTER_SHEET_NAME}!A:Z`);
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${SHEETS_API_KEY}`);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    const values = json.values||[];
    if(!values.length) return null;
    const fields = values[0];
    const rows = values.slice(1).map(r=>{
      const obj={};
      fields.forEach((f,i)=>{ obj[f]=r[i]!==undefined?r[i]:""; });
      return obj;
    });
    return { rows, fields };
  }catch(e){
    console.warn(`ไม่พบแท็บ "${ROSTER_SHEET_NAME}" (ข้ามได้ ไม่กระทบข้อมูลหลัก):`, e.message);
    return null;
  }
}

function mergeRosterIntoDB(db, roomSet, rosterData){
  if(!rosterData) return false;
  const { rows, fields } = rosterData;
  const col = {
    firstName: findColumn(fields, HEADER_KEYWORDS.firstName),
    lastName:  findColumn(fields, HEADER_KEYWORDS.lastName),
    nickname:  findColumn(fields, HEADER_KEYWORDS.nickname),
    group:     findColumn(fields, HEADER_KEYWORDS.group)
  };
  if(!col.group || !(col.firstName||col.nickname)) return false;
  rows.forEach(row=>{
    const group = cellStr(row[col.group]);
    if(!group) return;
    const first = col.firstName ? cellStr(row[col.firstName]) : "";
    const last  = col.lastName ? cellStr(row[col.lastName]) : "";
    const nick  = col.nickname ? cellStr(row[col.nickname]) : "";
    const fullName = [first,last].filter(Boolean).join(" ") || nick || "(ไม่ระบุชื่อ)";
    const displayName = nick ? `${fullName} (${nick})` : fullName;
    roomSet.add(group);
    db[group] = db[group] || [];
    let student = db[group].find(s=>s.key===fullName+"|"+nick);
    if(!student){
      student = { name: displayName, key: fullName+"|"+nick, submissions:{}, inRoster:true };
      db[group].push(student);
    }else{
      student.inRoster = true;
    }
  });
  return true;
}

async function loadData(){
  try{
    const {rows, fields} = await fetchLiveRows();
    const built = parseRowsToDB(rows, fields);
    if(!built.rooms.length) throw new Error("ไม่พบข้อมูลห้อง/กลุ่มเรียน");
    const roomSet = new Set(built.rooms);
    const rosterData = await fetchRosterRows();
    rosterLoaded = mergeRosterIntoDB(built.db, roomSet, rosterData);
    DB = built.db;
    ROOMS = sortByPreferred([...roomSet], PREFERRED_ROOM_ORDER);
    WEEKS = built.weeks;
    usingMockData = false;
  }catch(err){
    console.warn("โหลดข้อมูลจริงไม่สำเร็จ ใช้ข้อมูลตัวอย่างแทน:", err.message);
    const mock = buildMockDB();
    DB = mock.db; ROOMS = mock.rooms; WEEKS = mock.weeks;
    usingMockData = true; rosterLoaded = false;
  }
  if(!WEEKS.includes(currentWeek)) currentWeek = WEEKS[WEEKS.length-1];
  lastLoadedAt = new Date();
}

const ROOM_TOTAL_STUDENTS = {
  "ป.4 Basic": 30,
  "ป.4 Advance 1": 32,
  "ป.4 Advance 2": 31,
  "ป.4 Advance 3": 35,
  "ป.4 Basic Advance": 28,
  "ป.4 เปิดเพิ่ม": 33,
  "ป.4 Olympic 1": 33,
  "ป.4 Olympic 2": 28,
  "ป.4 Online": 27
};

function roomStats(room, week){
  const students = DB[room]||[];
  const sent = students.filter(s=>s.submissions[week]).length;
  const total = rosterLoaded ? students.length : (ROOM_TOTAL_STUDENTS[room] || students.length);
  return { total, sent, pct: total? Math.round(sent/total*100):0 };
}
function roomWeeklySeries(room){
  return WEEKS.map(w=>roomStats(room,w));
}

function initDashboard(room){

    drawTree(stats.pct);

    // roster
    const rosterEl = document.getElementById('roster');
    rosterEl.innerHTML = DB[room].map(s=>{
      const sent = !!s.submissions[week];
      const mismatch = rosterLoaded && s.inRoster===false;
      const nameHtml = mismatch
        ? `<span class="name-mismatch">${s.name} <span class="tag mismatch">⚠️ ไม่พบในบัญชีห้อง</span></span>`
        : `<span>${s.name}</span>`;
      return `<div class="roster-row ${mismatch?'roster-row-mismatch':''}">${nameHtml}<span class="tag ${sent?'sent':'missing'}">${sent?'ส่งแล้ว':'ยังไม่ส่ง'}</span></div>`;
    }).join('');
    const mismatchCount = DB[room].filter(s=>rosterLoaded && s.inRoster===false).length;
    const mismatchEl = document.getElementById('mismatchSummary');
    if(mismatchEl){
      if(mismatchCount>0){
        mismatchEl.style.display='block';
        mismatchEl.textContent = `⚠️ พบ ${mismatchCount} ชื่อที่ไม่ตรงกับบัญชีรายชื่อห้อง (อาจพิมพ์ชื่อผิด/เลือกห้องผิดตอนส่งฟอร์ม) — ลองแก้ไขในชีตให้ตรงกัน`;
      }else{
        mismatchEl.style.display='none';

    }

    // gallery
    const galleryEl = document.getElementById('gallery');
    const shots = DB[room].filter(s=>s.submissions[week]);

      const sub = s.submissions[week];

    }
  });
}

/* ---------- GROWING TREE (SVG, shared) ---------- */
const svgNS = "http://www.w3.org/2000/svg";
function clearEl(el){ while(el.firstChild) el.removeChild(el.firstChild); }
function makeLine(x1,y1,x2,y2,w,color){
  const l=document.createElementNS(svgNS,'line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',color);l.setAttribute('stroke-width',w);l.setAttribute('stroke-linecap','round');
  return l;
}
function makeLeaf(svg,x,y,r,color,delay){
  const c=document.createElementNS(svgNS,'circle');
  c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',0);
  c.setAttribute('fill',color);
  c.style.transition=`r .5s cubic-bezier(.34,1.56,.64,1) ${delay}ms, opacity .4s ${delay}ms`;
  c.style.opacity='0';
  svg.appendChild(c);
  requestAnimationFrame(()=>{ c.setAttribute('r', r); c.style.opacity='1'; });
}
function fadeInEllipse(svg, cx, cy, rx, ry, color, delay){
  const e = document.createElementNS(svgNS,'ellipse');
  e.setAttribute('cx', cx); e.setAttribute('cy', cy);
  e.setAttribute('rx', rx); e.setAttribute('ry', ry);
  e.setAttribute('fill', color);
  e.style.opacity = '0';
  e.style.transition = `opacity .5s ${delay}ms`;
  svg.appendChild(e);
  requestAnimationFrame(()=>{ e.style.opacity='1'; });
}
function fadeInText(svg, x, y, size, color, content, delay){
  const t = document.createElementNS(svgNS,'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('font-size', size);
  t.setAttribute('fill', color);
  t.setAttribute('text-anchor','middle');
  t.textContent = content;
  t.style.opacity = '0';
  t.style.transition = `opacity .4s ${delay}ms`;
  svg.appendChild(t);
  requestAnimationFrame(()=>{ t.style.opacity='1'; });
}

/* ต้นไม้การ์ตูนน่ารัก โตแบบค่อยเป็นค่อยไปต่อเนื่องตาม pct (0-100) ไม่มีจุดกระโดดสเตจ
   เริ่มจากเมล็ด/หน่ออ่อนจิ๋ว ค่อย ๆ สูงและพุ่มใบใหญ่ขึ้นเรื่อย ๆ พร้อมหน้าตายิ้มน่ารัก */
function drawTree(pct, targetId='treeSvg'){
  const svg = document.getElementById(targetId);
  if(!svg) return;
  clearEl(svg);
  const vb = svg.viewBox.baseVal;
  const W = vb.width||400, H = vb.height||340;
  const groundY = H-20;
  const cx = W/2;

  // พื้นเป็นเนินดินโค้งมนน่ารัก แทนสี่เหลี่ยมแบน ๆ
  const ground = document.createElementNS(svgNS,'path');
  ground.setAttribute('d', `M0 ${groundY+6} Q ${W/2} ${groundY-6} ${W} ${groundY+6} L ${W} ${H} L 0 ${H} Z`);
  ground.setAttribute('fill', '#D9CFAE');
  svg.appendChild(ground);
  // กอหญ้าเล็ก ๆ ประดับสองข้าง (ของตกแต่งคงที่ ไม่ขึ้นกับ pct)
  [-1,1].forEach(side=>{
    [0.55, 0.8].forEach((f,i)=>{
      const gx = cx + side*(60+ i*30)*f;
      const gy = groundY + 4 - i*2;
      fadeInGrass(svg, gx, gy, side, 0);
    });
  });

  // โตต่อเนื่องตั้งแต่หน่ออ่อนจิ๋ว (pct=0) ไปจนต้นสมบูรณ์ (pct=100) ไม่มีจุดกระโดด
  const growth = pct/100;
  const trunkLen = 10 + growth*82;               // 10px หน่อจิ๋ว -> 92px ต้นโต
  const trunkTopY = groundY - trunkLen;
  const trunkBaseWidth = 4 + growth*10;
  const trunkTopWidth = 2.5 + growth*4;
  const flare = trunkBaseWidth*0.6;

  const trunk = document.createElementNS(svgNS,'path');
  trunk.setAttribute('d', `M ${cx-trunkBaseWidth-flare} ${groundY}
    Q ${cx-trunkBaseWidth} ${groundY-10} ${cx-trunkBaseWidth} ${groundY-Math.min(22,trunkLen*0.5)}
    L ${cx-trunkTopWidth} ${trunkTopY}
    L ${cx+trunkTopWidth} ${trunkTopY}
    L ${cx+trunkBaseWidth} ${groundY-Math.min(22,trunkLen*0.5)}
    Q ${cx+trunkBaseWidth} ${groundY-10} ${cx+trunkBaseWidth+flare} ${groundY} Z`);
  trunk.setAttribute('fill', '#9C7A54');
  svg.appendChild(trunk);
  const shade = document.createElementNS(svgNS,'path');
  shade.setAttribute('d', `M ${cx-trunkTopWidth*0.25} ${trunkTopY} L ${cx-trunkBaseWidth*0.25} ${groundY} L ${cx} ${groundY} L ${cx} ${trunkTopY} Z`);
  shade.setAttribute('fill', '#7C6041');
  shade.setAttribute('opacity','0.5');
  svg.appendChild(shade);

  // ใบเลี้ยงเล็ก ๆ ติดโคนต้นไว้เสมอ ให้ฟีลน่ารักแบบหน่ออ่อน แม้ตอนต้นโตแล้วก็ยังมีใบอ่อนแซมอยู่
  fadeInEllipse(svg, cx-trunkBaseWidth-6, groundY-6, 8, 4.5, '#8CC152', 0);
  fadeInEllipse(svg, cx+trunkBaseWidth+6, groundY-6, 8, 4.5, '#8CC152', 60);

  // พุ่มใบ: ก้อนเมฆน่ารักซ้อนกัน 2 โทนสี ขนาดโตต่อเนื่องตาม pct (เริ่มจิ๋วมาก ๆ ตอน pct=0)
  const scale = 0.18 + growth*1.25;
  const baseR = 24*scale;
  const canopyCenterY = trunkTopY - baseR*0.3;
  const greenDark  = pct>75 ? '#4C9A4F' : pct>40 ? '#5FAE55' : '#8CBE6A';
  const greenLight = pct>75 ? '#8FD684' : pct>40 ? '#9BD98C' : '#C3E6A8';

  const canopyGroup = document.createElementNS(svgNS,'g');
  canopyGroup.setAttribute('class','tree-sway');
  svg.appendChild(canopyGroup);

  const satelliteAngles = [-150,-105,-55,-15,25,70,115,160];
  const blobs = [{dx:0, dy:-baseR*0.25, r:baseR}];
  satelliteAngles.forEach((deg,i)=>{
    const rad = deg*Math.PI/180;
    const dist = baseR*0.85;
    const r = baseR*(0.42+0.12*(i%3));
    blobs.push({dx: Math.cos(rad)*dist, dy: Math.sin(rad)*dist*0.65 - baseR*0.15, r});
  });
  blobs.forEach((b,i)=>{
    const delay = i*45;
    fadeInEllipse(canopyGroup, cx+b.dx, canopyCenterY+b.dy, b.r*1.05, b.r*0.95, greenDark, delay);
    fadeInEllipse(canopyGroup, cx+b.dx-b.r*0.18, canopyCenterY+b.dy-b.r*0.22, b.r*0.6, b.r*0.5, greenLight, delay+40);
  });

  // หน้าตายิ้มน่ารักบนพุ่มหลัก (โผล่มาเมื่อต้นเริ่มโตพอจะเห็นหน้าชัด)
  if(baseR > 14){
    const faceY = canopyCenterY - baseR*0.25;
    const eyeR = Math.max(1.6, baseR*0.07);
    fadeInEllipse(canopyGroup, cx-baseR*0.28, faceY, eyeR, eyeR, '#2E3B22', 500);
    fadeInEllipse(canopyGroup, cx+baseR*0.28, faceY, eyeR, eyeR, '#2E3B22', 520);
    const smile = document.createElementNS(svgNS,'path');
    const sw = baseR*0.22;
    smile.setAttribute('d', `M ${cx-sw} ${faceY+baseR*0.12} Q ${cx} ${faceY+baseR*0.12+sw*0.7} ${cx+sw} ${faceY+baseR*0.12}`);
    smile.setAttribute('stroke','#2E3B22'); smile.setAttribute('stroke-width', Math.max(1.4,baseR*0.045));
    smile.setAttribute('stroke-linecap','round'); smile.setAttribute('fill','none');
    smile.style.opacity='0'; smile.style.transition='opacity .4s 560ms';
    canopyGroup.appendChild(smile);
    requestAnimationFrame(()=>{ smile.style.opacity='1'; });
    // แก้มชมพูจุ๋มจิ๋ม
    fadeInEllipse(canopyGroup, cx-baseR*0.55, faceY+baseR*0.18, eyeR*1.3, eyeR*0.9, 'rgba(255,143,177,.55)', 560);
    fadeInEllipse(canopyGroup, cx+baseR*0.55, faceY+baseR*0.18, eyeR*1.3, eyeR*0.9, 'rgba(255,143,177,.55)', 560);
  }

  // ดอก/ผลเล็ก ๆ เมื่อสมบูรณ์ขึ้น
  if(pct>55){
    const dotCount = Math.round((pct-55)/8);
    for(let i=0;i<dotCount;i++){
      const rand = Math.abs(Math.sin(i*999));
      const bx = cx + (rand-0.5)*baseR*2.2;
      const by = canopyCenterY - baseR*0.15 + Math.cos(i*77)*baseR*0.55;
      fadeInEllipse(canopyGroup, bx, by, 4, 4, '#FFC94A', 300+i*40);
    }
  }

  // ประกายเมื่อสมบูรณ์เต็มที่
  if(pct>70){
    const sparkleCount = 2 + Math.round((pct-70)/10);
    for(let i=0;i<sparkleCount;i++){
      const ang = i*137.5;
      const dist = baseR*(0.95+0.3*(i%2));
      const sx = cx + Math.cos(ang*Math.PI/180)*dist;
      const sy = canopyCenterY - baseR*0.4 + Math.sin(ang*Math.PI/180)*dist*0.5;
      fadeInText(canopyGroup, sx, sy, 12+(i%3)*3, '#FFD93D', '✦', 400+i*70);
    }
  }
}

function fadeInGrass(svg, x, y, side, delay){
  const g = document.createElementNS(svgNS,'path');
  const w = 5, h = 12;
  g.setAttribute('d', `M ${x} ${y} Q ${x+side*w} ${y-h*0.6} ${x} ${y-h} Q ${x-side*w*0.6} ${y-h*0.6} ${x} ${y}`);
  g.setAttribute('fill', '#8CBE6A');
  g.style.opacity='0'; g.style.transition=`opacity .5s ${delay}ms`;
  svg.appendChild(g);
  requestAnimationFrame(()=>{ g.style.opacity='1'; });
}

let jotformWindowRef = null;
let jotformWatchTimer = null;
function openFormAndWatch(){
  jotformWindowRef = window.open(JOTFORM_URL, '_blank');
  if(!jotformWindowRef){
    // ถ้าเบราว์เซอร์บล็อก popup ให้ลิงก์ธรรมดาเปิดแท็บใหม่แทน (ยังใช้งานได้ปกติ แค่ไม่มี auto-return)
    window.location.href = JOTFORM_URL;
    return;
  }
  showToast('เปิดฟอร์มในแท็บใหม่แล้ว — กรอกเสร็จปิดแท็บนั้นเพื่อกลับมาดูผลอัตโนมัติ');
  if(jotformWatchTimer) clearInterval(jotformWatchTimer);
  jotformWatchTimer = setInterval(async ()=>{
    if(jotformWindowRef && jotformWindowRef.closed){
      clearInterval(jotformWatchTimer);
      jotformWatchTimer = null;
      showToast('กำลังอัปเดตข้อมูลและพาไปหน้าผลการทดลอง...');
      await loadData();
      nav('/parent/view');
    }
  }, 700);
}

let visibilityListenerBound = false;
function initParentRecord(){
  if(!visibilityListenerBound){
    visibilityListenerBound = true;
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible' && location.hash.startsWith('#/parent') && !location.hash.includes('/view')){
        onReturnedToTab();

async function onReturnedToTab(){

  const note2 = document.getElementById('autoUpdateNote');

      : 'ข้อมูลอัปเดตล่าสุดแล้ว ✓ กดปุ่ม "ดูผลการทดลอง" ได้เลย';

}

/* ---------- PARENT: SEARCH (ดูผลการทดลอง ขั้นที่ 2) ---------- */
function viewSearch(room){
  return `
  <span class="back" onclick="nav('/parent/view')">← กลับไปเลือกห้อง</span>
  <div class="eyebrow">ดูผลการทดลอง</div>
  <h1>${room}</h1>
  <div class="card search-box">
    <h2>ค้นหาชื่อนักเรียน</h2>
    <input id="searchInput" placeholder="พิมพ์ชื่อ...">
    <div class="name-list" id="nameList"></div>
  </div>`;
}
function initSearch(room){
  const input = document.getElementById('searchInput');
  const list = document.getElementById('nameList');
  function draw(filter=''){
    const items = (DB[room]||[]).filter(s=>s.name.includes(filter));
    list.innerHTML = items.map(s=>`
      <div class="name-item" onclick="nav('/parent/view/room/'+encodeURIComponent('${room}')+'/student/'+encodeURIComponent('${s.name}'))">
        <span>${s.name}</span><span class="sub" style="margin:0;">เลือก →</span>
      </div>`).join('') || `<p class="sub">ไม่พบชื่อที่ค้นหา</p>`;
  }
  draw();
  input.addEventListener('input', ()=>draw(input.value.trim()));
}

/* ---------- PARENT: STUDENT RESULT (ดูผลการทดลอง ขั้นสุดท้าย, ดูอย่างเดียว) ---------- */
function viewStudentResult(room, name){
  return `
  <span class="back" onclick="nav('/parent/view/room/'+encodeURIComponent('${room}'))">← กลับไปค้นหาชื่อ</span>
  <div class="eyebrow">${room}</div>
  <h1>${name}</h1>
  <div id="resultContent"></div>`;
}
function initStudentResult(room, name){
  const student = (DB[room]||[]).find(s=>s.name===name);
  const el = document.getElementById('resultContent');
  if(!student){ el.innerHTML = `<div class="card"><p class="sub">ไม่พบข้อมูลของนักเรียนคนนี้</p></div>`; return; }

  const total = WEEKS.length;
  const sent = WEEKS.filter(w=>student.submissions[w]).length;
  const pct = total? Math.round(sent/total*100):0;
  el.innerHTML = `
    <div class="grid">
      <div class="card tree-card">
        <h2>ความสม่ำเสมอของ ${name}</h2>
        <p class="sub">ส่งแล้ว ${sent}/${total} สัปดาห์</p>
        <div class="tree-stage">
          <div class="tree-stat">อัตราการส่ง<b>${pct}%</b></div>
          <svg id="studentTreeSvg" viewBox="0 0 400 340" style="width:100%;height:100%;"></svg>
        </div>
      </div>
      <div class="card">
        <h2>ประวัติการส่งผล</h2>
        <div class="roster">
          ${WEEKS.map(w=>{
            const sub = student.submissions[w];
            return `<div class="roster-row"><span>${w}${sub?` — ${sub.result.slice(0,26)}${sub.result.length>26?'…':''}`:''}</span><span class="tag ${sub?'sent':'missing'}">${sub?'ส่งแล้ว':'ยังไม่ส่ง'}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:18px;">
      <h2>รูปภาพของฉัน</h2>
      <div class="gallery">
        ${WEEKS.filter(w=>student.submissions[w]).map(w=>{
          const sub = student.submissions[w];
          return `<div class="ph ${sub.photo?'has-photo':''}">${sub.photo?`<img src="${proxiedImageUrl(sub.photo)}" data-original="${sub.photo}" onerror="photoLoadError(this)">`:''}</div>`;
        }).join('') || `<p class="sub">ยังไม่มีภาพที่แนบมา</p>`}
      </div>
    </div>`;
  drawTree(pct, 'studentTreeSvg');
}

/* ---------- toast ---------- */
/* ถ้ารูปฝังแสดงไม่ได้ (เช่น โดนบล็อก hotlink หรือ URL ต้องเปิดผ่านเบราว์เซอร์ตรง ๆ)
   ให้เปลี่ยนเป็นลิงก์ให้กดเปิดดูแทน ดีกว่าโชว์ไอคอนรูปพังเฉย ๆ */
/* รูปจาก JotForm บัญชีนี้ต้องล็อกอินก่อนถึงจะดูได้ตรง ๆ (ตั้งค่าความปลอดภัยของบัญชี)
   จึงต้องผ่าน Netlify Function ที่ถือ JOTFORM_API_KEY ไว้อย่างปลอดภัยฝั่งเซิร์ฟเวอร์แทน
   (ดูรายละเอียดที่ netlify/functions/photo-proxy.js) — ไม่มีการฝัง API key ในหน้าเว็บเลย */
function proxiedImageUrl(url){
  if(!url) return url;
  return `/.netlify/functions/photo-proxy?url=${encodeURIComponent(url)}`;
}

/* ถ้ารูปฝังแสดงไม่ได้ (แม้ผ่านพร็อกซีแล้วก็ยังพลาด) ให้เปลี่ยนเป็นลิงก์เปิดรูปต้นฉบับแทน */
function photoLoadError(img){
  const url = img.dataset.original || img.src;
  const wrap = img.parentElement;
  if(wrap){
    wrap.classList.add('photo-broken');
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.className = 'photo-fallback-link';
    a.textContent = '📷 ดูรูป';
    wrap.innerHTML = '';
    wrap.appendChild(a);
  }
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
